name: CI & Publish

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ---------------------------------------------------------------
        # Python × Django matrix – kept in sync with noxfile.py
        #
        # Django 4.2 LTS : Python 3.10 – 3.12
        # Django 5.1     : Python 3.10 – 3.13
        # Django 5.2 LTS : Python 3.10 – 3.13
        # Django 6.0     : Python 3.12 – 3.13
        # ---------------------------------------------------------------
        include:
          # Django 4.2 LTS
          - { python-version: "3.10", django-version: "4.2" }
          - { python-version: "3.11", django-version: "4.2" }
          - { python-version: "3.12", django-version: "4.2" }
          # Django 5.1
          - { python-version: "3.10", django-version: "5.1" }
          - { python-version: "3.11", django-version: "5.1" }
          - { python-version: "3.12", django-version: "5.1" }
          - { python-version: "3.13", django-version: "5.1" }
          # Django 5.2 LTS
          - { python-version: "3.10", django-version: "5.2" }
          - { python-version: "3.11", django-version: "5.2" }
          - { python-version: "3.12", django-version: "5.2" }
          - { python-version: "3.13", django-version: "5.2" }
          # Django 6.0
          - { python-version: "3.12", django-version: "6.0" }
          - { python-version: "3.13", django-version: "6.0" }

    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compute Django version constraint
        id: dj
        run: |
          DV="${{ matrix.django-version }}"
          MAJOR="${DV%%.*}"
          MINOR="${DV#*.}"
          NEXT_MINOR=$((MINOR + 1))
          echo "spec=Django>=${DV},<${MAJOR}.${NEXT_MINOR}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          uv pip install --system -e "."
          uv pip install --system "${{ steps.dj.outputs.spec }}" pytest pytest-django

      - name: Run tests
        run: pytest tests/ --verbosity=2

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install --system -e "."
          uv pip install --system pytest pytest-django coverage[toml]

      - name: Run tests with coverage
        run: |
          coverage run -m pytest tests/ --verbosity=2
          coverage report --fail-under=70

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for hatch-vcs

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: uvx --from build pyproject-build --installer uv

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
